<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MetaPohyb</title>
  <!-- Language detection redirect: /sk/ for Slovak browsers, /en/ otherwise -->
  <script>
    (function () {
      var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
      var target = lang.startsWith('sk') ? '/sk/' : '/en/';
      window.location.replace(target);
    })();
  </script>
  <!-- Fallback for no-JS: redirect to English -->
  <meta http-equiv="refresh" content="0; url=/en/" />
</head>
<body>
  <p>Redirecting&hellip; <a href="/en/">English</a> | <a href="/sk/">Slovenčina</a></p>
</body>
</html>
